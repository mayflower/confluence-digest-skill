# confluence-digest – Vorlage. Beim ersten Lauf wird daraus config.local.yaml erzeugt.
cloudId: <cloud-id>   # mayflowergmbh
accountId: auto            # beim 1. Lauf via atlassianUserInfo automatisch gefüllt; von späteren Stufen genutzt (Stufe 1 nutzt currentUser())
signals:
  mentions: true
  ownEdits: true
  keywords: []             # Themen-Keywords (Liste). Nicht-leer = Keyword-Signal aktiv; per Onboarding/`setup` befüllt (Stufe 1.5).
  people:   []             # Stufe 2
limits:
  maxSummaries: 8
onboarding:
  hintShown: false         # Stufe 1.5: wird true, sobald der Keyword-Hinweis einmal gezeigt ODER `setup` gelaufen ist
