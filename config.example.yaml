# confluence-digest – Vorlage. Beim ersten Lauf wird daraus config.local.yaml erzeugt.
mcpServer: atlassian-mayflower   # Name deines Atlassian-MCP-Servers (Tools heißen mcp__<mcpServer>__*); z.B. atlassian, claude_ai_Atlassian
cloudId: "<cloud-id>"   # eigene Confluence-cloudId eintragen – siehe README („cloudId ermitteln")
accountId: auto            # beim 1. Lauf via atlassianUserInfo automatisch gefüllt; von späteren Stufen genutzt (Stufe 1 nutzt currentUser())
signals:
  mentions: true
  ownEdits: true
  keywords: []             # Themen-Keywords, Volltext-Match (text ~). Nicht-leer = aktiv. Per `setup` befüllt (Stufe 1.5).
  titleKeywords: []        # Themen-Keywords, nur Titel-Match (title ~) – schmal, für breite Orts-/Adressbegriffe (z.B. Standort).
  people:   []             # Verfolgte Personen als {name, id}-Einträge (id = accountId), z.B.
                           # [{name: "Vorname Nachname", id: "557058:..."}]. Nicht-leer = aktiv.
                           # Per `setup` befüllt (Name → accountId via lookupJiraAccountId).
limits:
  highlights: 5        # Anzahl detaillierter Highlights (Top-Score, je 2–4 Sätze)
  groupSummaries: 8    # max Kurz-Summaries (2–3 Sätze) je Restgruppe; darüber nur Titel + Link
onboarding:
  hintShown: false         # Stufe 1.5: wird true, sobald der Keyword-Hinweis einmal gezeigt ODER `setup` gelaufen ist
